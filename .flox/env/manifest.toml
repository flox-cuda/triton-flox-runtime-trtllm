## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
version = 1


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
triton-python-backend.pkg-path = "flox/triton-python-backend"
triton-python-backend.systems = ["x86_64-linux"]
triton-python-backend.priority = 4
triton-onnxruntime-backend.pkg-path = "flox/triton-onnxruntime-backend"
triton-onnxruntime-backend.systems = ["x86_64-linux"]
triton-onnxruntime-backend.priority = 5
triton-tensorrt-backend.pkg-path = "flox/triton-tensorrt-backend"
triton-tensorrt-backend.systems = ["x86_64-linux"]
triton-tensorrt-backend.priority = 6
shellcheck.pkg-path = "shellcheck"
bats.pkg-path = "bats"
numpy.pkg-path = "flox-cuda/python3Packages.numpy"
numpy.systems = ["aarch64-linux", "x86_64-linux"]
numpy.pkg-group = "numpy"
torch.pkg-path = "flox-cuda/python3Packages.torch"
torch.systems = ["aarch64-linux", "x86_64-linux"]
torch.pkg-group = "torch"
transformers.pkg-path = "flox-cuda/python3Packages.transformers"
transformers.systems = ["aarch64-linux", "x86_64-linux"]
transformers.pkg-group = "transformers"
vllm.pkg-path = "flox-cuda/python3Packages.vllm"
vllm.systems = ["x86_64-linux"]
vllm.pkg-group = "vllm"
util-linux.pkg-path = "util-linux"
util-linux.systems = ["x86_64-linux"]
iproute2.pkg-path = "iproute2"
iproute2.systems = ["x86_64-linux"]
uv.pkg-path = "uv"
triton-server.store-path = "/nix/store/k7y29brmb1gij8hrjn71p4w0w683yzwq-triton-server-2.66.0+bea06f4"
triton-server.systems = ["x86_64-linux"]
triton-server.priority = 3
triton-tensorrtllm-backend.pkg-path = "flox/triton-tensorrtllm-backend"
triton-tensorrtllm-backend.systems = ["x86_64-linux"]
triton-tensorrtllm-backend.version = "2.66.0+c279dda"
triton-tensorrtllm-backend.pkg-group = "triton-tensorrtllm"
triton-tensorrtllm-backend.priority = 7

## optional models for model serving demo
triton-model-qwen2-5-05b-trtllm.store-path = "/nix/store/9y0hm72y8ald16dfp4m66hch5q5kb8cz-triton-model-qwen2-5-05b-trtllm-0.1.0+199a7d1"
triton-model-qwen2-5-05b-trtllm.systems = ["x86_64-linux"]
triton-model-phi4-mini-trtllm.store-path = "/nix/store/0ryy8l1779irvmmx37f0h9d2hn3839i4-triton-model-phi4-mini-trtllm-0.1.0+199a7d1"
triton-model-phi4-mini-trtllm.systems = ["x86_64-linux"]


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
TRITON_MODEL = "phi4_mini_trtllm"
TRITON_OPENAI_FRONTEND = "true"
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = '''
  triton-setup-backends
  export TRITON_BACKEND_DIR="$FLOX_ENV_CACHE/backends"

  # TRT-LLM: backend libs + MPI (OPAL_PREFIX for MPI_Init_thread help/MCA modules)
  if [[ -d "$FLOX_ENV_CACHE/backends/tensorrtllm" ]]; then
    _trtllm_root="$(readlink -f "$FLOX_ENV_CACHE/backends/tensorrtllm")"
    _trtllm_root="${_trtllm_root%/backends/tensorrtllm}"
    export LD_LIBRARY_PATH="${_trtllm_root}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
    if [[ -d "$_trtllm_root/hpcx/ompi" ]]; then
      export OPAL_PREFIX="$_trtllm_root/hpcx/ompi"
      export LD_LIBRARY_PATH="${_trtllm_root}/hpcx/ompi/lib:$LD_LIBRARY_PATH"
    fi
    # CUDA driver stub — isolated dir to avoid host libc conflicts
    _cuda_stub_dir="$FLOX_ENV_CACHE/cuda-driver-stub"
    if [[ ! -d "$_cuda_stub_dir" ]]; then
      mkdir -p "$_cuda_stub_dir"
      for _lib in libcuda.so.1 libnvidia-ml.so.1; do
        for _dir in /usr/lib/x86_64-linux-gnu /usr/lib64; do
          if [[ -e "$_dir/$_lib" ]]; then
            ln -sf "$_dir/$_lib" "$_cuda_stub_dir/$_lib"
            break
          fi
        done
      done
    fi
    export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:$_cuda_stub_dir"
  fi

  triton-setup-models
  export TRITON_MODEL_REPOSITORY="${TRITON_MODEL_REPOSITORY:-$FLOX_ENV_CACHE/models}"

  # Auto-resolve tokenizer for OpenAI chat templates
  if [[ -n "${TRITON_MODEL:-}" ]] && [[ -z "${TRITON_OPENAI_TOKENIZER:-}" ]]; then
    _tokenizer_dir="$TRITON_MODEL_REPOSITORY/$TRITON_MODEL/tokenizer"
    if [[ -d "$_tokenizer_dir" ]]; then
      export TRITON_OPENAI_TOKENIZER="$(readlink -f "$_tokenizer_dir")"
    fi
  fi

  # OpenAI frontend dependencies
  _ts_prefix="$(dirname "$(command -v tritonserver)")/.."
  _openai_main="$_ts_prefix/python/openai/main.py"
  if [[ -f "$_openai_main" ]]; then
    _openai_reqs="$_ts_prefix/python/openai/requirements.txt"
    _openai_deps="$FLOX_ENV_CACHE/openai-deps"
    _openai_sentinel="$_openai_deps/.installed-v2"
    if [[ ! -f "$_openai_sentinel" ]]; then
      echo "Installing OpenAI frontend dependencies..."
      mkdir -p "$_openai_deps"
      uv pip install --target "$_openai_deps" \
        -r "$_openai_reqs" \
        "$_ts_prefix"/python/tritonserver-*.whl \
        "$_ts_prefix"/python/tritonfrontend-*.whl \
        2>&1 | tail -1
      # Remove pip numpy — it shadows the Nix-provided one which has
      # proper RPATH for libstdc++ (pip manylinux wheel does not).
      rm -rf "$_openai_deps"/numpy{,.libs,*.dist-info}
      touch "$_openai_sentinel"
    fi
    export PYTHONPATH="${_openai_deps}${PYTHONPATH:+:$PYTHONPATH}"

    # Patch transformers 5.x compat (all_special_tokens_extended removed)
    _compat_dir="$FLOX_ENV_CACHE/python-compat"
    if [[ ! -f "$_compat_dir/sitecustomize.py" ]]; then
      mkdir -p "$_compat_dir"
      cat > "$_compat_dir/sitecustomize.py" << 'COMPATEOF'
import transformers.tokenization_utils_base as _tub
if not hasattr(_tub.PreTrainedTokenizerBase, 'all_special_tokens_extended'):
    @property
    def _all_special_tokens_extended(self):
        return list(self.all_special_tokens)
    _tub.PreTrainedTokenizerBase.all_special_tokens_extended = _all_special_tokens_extended
COMPATEOF
    fi
    export PYTHONPATH="${_compat_dir}:$PYTHONPATH"
  fi
'''


