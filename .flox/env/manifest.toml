## Flox Environment Manifest -----------------------------------------
##
##   _Everything_ you need to know about the _manifest_ is here:
##
##   https://flox.dev/docs/reference/command-reference/manifest.toml/
##
## -------------------------------------------------------------------
# Flox manifest version managed by Flox CLI
version = 1


## Install Packages --------------------------------------------------
##  $ flox install gum  <- puts a package in [install] section below
##  $ flox search gum   <- search for a package
##  $ flox show gum     <- show all versions of a package
## -------------------------------------------------------------------
[install]
triton-server.pkg-path = "meetrlyio/triton-server"
triton-server.systems = ["x86_64-linux"]
triton-python-backend.pkg-path = "meetrlyio/triton-python-backend"
triton-python-backend.systems = ["x86_64-linux"]
triton-python-backend.priority = 4
triton-onnxruntime-backend.pkg-path = "meetrlyio/triton-onnxruntime-backend"
triton-onnxruntime-backend.systems = ["x86_64-linux"]
triton-onnxruntime-backend.priority = 5
triton-tensorrt-backend.pkg-path = "meetrlyio/triton-tensorrt-backend"
triton-tensorrt-backend.systems = ["x86_64-linux"]
triton-tensorrt-backend.priority = 6
triton-tensorrtllm-backend.pkg-path = "flox/triton-tensorrtllm-backend"
triton-tensorrtllm-backend.systems = ["x86_64-linux"]
triton-tensorrtllm-backend.priority = 7
shellcheck.pkg-path = "shellcheck"
bats.pkg-path = "bats"
numpy.pkg-path = "flox-cuda/python3Packages.numpy"
numpy.systems = ["aarch64-linux", "x86_64-linux"]
numpy.pkg-group = "numpy"
torch.pkg-path = "flox-cuda/python3Packages.torch"
torch.systems = ["aarch64-linux", "x86_64-linux"]
torch.pkg-group = "torch"
transformers.pkg-path = "flox-cuda/python3Packages.transformers"
transformers.systems = ["aarch64-linux", "x86_64-linux"]
transformers.pkg-group = "transformers"
vllm.pkg-path = "flox-cuda/python3Packages.vllm"
vllm.systems = ["x86_64-linux"]
vllm.pkg-group = "vllm"
util-linux.pkg-path = "util-linux"
util-linux.systems = ["x86_64-linux"]
iproute2.pkg-path = "iproute2"
iproute2.systems = ["x86_64-linux"]
# gum.pkg-path = "gum"
# gum.version = "^0.14.5"


## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = '''
  triton-setup-backends
  export TRITON_BACKEND_DIR="$FLOX_ENV_CACHE/backends"
'''


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
# common = '''
#   gum style \
#   --foreground 212 --border-foreground 212 --border double \
#   --align center --width 50 --margin "1 2" --padding "2 4" \
#     $INTRO_MESSAGE
# '''
## Shell-specific customizations such as setting aliases go here:
# bash = ...
# zsh  = ...
# fish = ...


## Services ---------------------------------------------------------
##  $ flox services start             <- Starts all services
##  $ flox services status            <- Status of running services
##  $ flox activate --start-services  <- Activates & starts all
## ------------------------------------------------------------------
[services]
tritonserver.command = "triton-resolve-model && triton-serve"


## Include ----------------------------------------------------------
## ... environments to create a composed environment
## ------------------------------------------------------------------
[include]
# environments = [
#     { dir = "../common" }
# ]


## Build and publish your own packages ------------------------------
##  $ flox build
##  $ flox publish
## ------------------------------------------------------------------
[build]
